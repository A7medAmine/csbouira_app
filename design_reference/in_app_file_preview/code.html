<script>
        // Simulate progress for the snackbar
        let progress = 45;
        const bar = document.getElementById('progress-bar');
        const percentageText = document.querySelector('.text-primary.font-bold');
        
        const interval = setInterval(() => {
            if (progress < 98) {
                progress += Math.random() * 2;
                bar.style.width = `${progress}%`;
                percentageText.innerText = `${Math.floor(progress)}%`;
            } else {
                clearInterval(interval);
                setTimeout(() => {
                    hideSnackbar();
                }, 1500);
            }
        }, 800);

        function hideSnackbar() {
            const snackbar = document.getElementById('snackbar');
            snackbar.style.transform = 'translateY(150%)';
            setTimeout(() => snackbar.remove(), 500);
        }

        // Hide zoom hint after a few seconds
        setTimeout(() => {
            const hint = document.getElementById('zoom-hint');
            if (hint) {
                hint.style.opacity = '0';
                setTimeout(() => hint.remove(), 1000);
            }
        }, 5000);

        // Simple scale effect on scroll
        const main = document.querySelector('main');
        main.addEventListener('scroll', () => {
            // Optional: add visual dynamics on scroll if needed
        });
    </script>
