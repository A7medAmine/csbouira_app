<style>
        body {
            background-color: #0D0D14;
            color: #e1e0f6;
            -webkit-font-smoothing: antialiased;
        }
        .glass-panel {
            background: rgba(21, 21, 31, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(26, 26, 38, 1);
        }
        .glow-button {
            box-shadow: 0 0 20px rgba(90, 140, 255, 0.15);
        }

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

        /* Custom scrollbar for webkit */

    body {
      min-height: max(884px, 100dvh);
    }

<body class="min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop overflow-hidden">
<!-- Atmospheric Background Animation -->

<!-- Main Content Shell -->
<main class="relative z-10 w-full max-w-[440px]">
<!-- Header / Logo Area -->
<div class="flex flex-col items-center mb-stack-lg animate-in fade-in slide-in-from-bottom-4 duration-700">
<div class="w-16 h-16 bg-primary-container rounded-2xl flex items-center justify-center mb-stack-md shadow-2xl">
<span class="material-symbols-outlined text-on-primary-container text-[40px]">terminal</span>
</div>
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary text-center">CS Bouira</h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center mt-2 opacity-80">The Academic Resource Hub for Computer Science</p>
</div>
<!-- Auth Card -->
<div class="glass-panel p-stack-lg rounded-xl shadow-2xl animate-in fade-in slide-in-from-bottom-8 duration-1000">
<!-- Segmented Toggle -->
<div class="bg-surface-container-lowest p-1 rounded-lg flex items-center mb-stack-lg">
<button class="flex-1 py-2 font-label-md text-label-md rounded-md transition-all duration-300 bg-primary-container/20 text-primary font-bold" id="loginTab">
                    Log In
                </button>
<button class="flex-1 py-2 font-label-md text-label-md rounded-md transition-all duration-300 text-on-surface-variant hover:text-on-surface" id="signupTab">
                    Sign Up
                </button>
</div>
<form class="space-y-stack-md" onsubmit="event.preventDefault()">
<!-- Email Field -->
<div class="space-y-1">
<label class="font-label-md text-label-md text-on-surface-variant px-1" for="email">Email Address</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-outline text-[20px]">mail</span>
<input class="w-full bg-surface-container border-outline-variant/30 border rounded-lg py-3 pl-11 pr-4 font-body-md text-body-md focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-outline/50" id="email" placeholder="student@univ-bouira.dz" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1">
<div class="flex justify-between items-center px-1">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:underline" href="#">Forgot?</a>
</div>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-outline text-[20px]">lock</span>
<input class="w-full bg-surface-container border-outline-variant/30 border rounded-lg py-3 pl-11 pr-4 font-body-md text-body-md focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-outline/50" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 text-outline hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Action Buttons -->
<div class="pt-2 space-y-stack-md">
<button class="glow-button w-full bg-primary-container text-on-primary-container py-3.5 rounded-lg font-headline-md text-headline-md font-bold transition-all hover:brightness-110" id="mainBtn">
                        Log In
                    </button>
<div class="flex items-center gap-stack-md py-2">
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
<span class="font-label-md text-label-md text-outline/60">OR</span>
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
</div>
<a class="flex items-center justify-center w-full py-3 rounded-lg border border-outline-variant/30 hover:bg-surface-variant/20 transition-all font-body-md text-body-md text-on-surface" href="#">
                        Continue as Guest
                    </a>
</div>
</form>
</div>
<!-- Footer -->
<footer class="mt-stack-lg text-center px-margin-mobile">
<p class="font-label-md text-label-md text-on-surface-variant opacity-60">
                By continuing you agree to our <a class="text-primary-fixed-dim hover:underline" href="#">Terms of Service</a> and <a class="text-primary-fixed-dim hover:underline" href="#">Privacy Policy</a>.
            </p>
<div class="mt-stack-md flex justify-center gap-4 text-outline/40">
<span class="material-symbols-outlined text-[18px]">verified_user</span>
<span class="material-symbols-outlined text-[18px]">security</span>
<span class="material-symbols-outlined text-[18px]">school</span>
</div>
</footer>
</main>
<!-- Interactive Logic -->
<script>
        const loginTab = document.getElementById('loginTab');
        const signupTab = document.getElementById('signupTab');
        const mainBtn = document.getElementById('mainBtn');

        function toggleState(isSignup) {
            if (isSignup) {
                signupTab.classList.add('bg-primary-container/20', 'text-primary', 'font-bold');
                signupTab.classList.remove('text-on-surface-variant');
                loginTab.classList.remove('bg-primary-container/20', 'text-primary', 'font-bold');
                loginTab.classList.add('text-on-surface-variant');
                mainBtn.textContent = 'Sign Up';
            } else {
                loginTab.classList.add('bg-primary-container/20', 'text-primary', 'font-bold');
                loginTab.classList.remove('text-on-surface-variant');
                signupTab.classList.remove('bg-primary-container/20', 'text-primary', 'font-bold');
                signupTab.classList.add('text-on-surface-variant');
                mainBtn.textContent = 'Log In';
            }
        }

        loginTab.addEventListener('click', () => toggleState(false));
        signupTab.addEventListener('click', () => toggleState(true));

        // Subtle input interaction
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.parentElement.querySelector('label').classList.replace('text-on-surface-variant', 'text-primary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.parentElement.querySelector('label').classList.replace('text-primary', 'text-on-surface-variant');
            });
        });
    </script>
</body></html>
