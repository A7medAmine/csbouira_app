<body class="flex flex-col min-h-screen">
<!-- Top AppBar (from Shared Components) -->
<header class="fixed top-0 left-0 w-full z-50 bg-background border-b border-outline-variant/30 flex justify-between items-center px-margin-mobile py-4">
<div class="flex items-center gap-4">
<button class="hover:bg-surface-variant/50 transition-colors p-2 rounded-full active:scale-95 duration-200">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary">Profile</h1>
</div>
<button class="hover:bg-surface-variant/50 transition-colors p-2 rounded-full active:scale-95 duration-200">

</button>
</header>
<main class="flex-grow pt-24 pb-32 px-margin-mobile max-w-screen-md mx-auto w-full">
<!-- User Profile Header Section -->
<section class="flex flex-col items-center mb-stack-lg text-center">
<div class="relative group">
<div class="w-24 h-24 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container mb-stack-md primary-glow transition-transform duration-300 group-hover:scale-105">
<span class="font-display-lg text-display-lg leading-none pt-1">AM</span>
</div>
<button class="absolute bottom-4 right-0 bg-primary text-on-primary p-1.5 rounded-full shadow-lg border-2 border-background">
<span class="material-symbols-outlined text-[18px]">edit</span>
</button>
</div>
<h2 class="font-headline-lg text-headline-lg text-on-surface">Amine Mansouri</h2>
<p class="font-body-md text-body-md text-on-surface-variant">amine.mansouri@univ-bouira.dz</p>
</section>
<!-- Stats Bento-ish Grid -->
<div class="grid grid-cols-2 gap-4 mb-stack-lg">
<div class="glass-panel p-4 rounded-xl flex flex-col items-center justify-center">
<span class="font-headline-md text-headline-md text-primary">12</span>
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Uploads</span>
</div>
<div class="glass-panel p-4 rounded-xl flex flex-col items-center justify-center">
<span class="font-headline-md text-headline-md text-primary">48</span>
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Favorites</span>
</div>
</div>
<!-- Settings List Rows -->
<section class="space-y-2">
<!-- Row: My Uploads -->
<button class="w-full glass-panel flex items-center justify-between p-4 rounded-xl hover:bg-surface-variant/50 transition-colors group active:scale-[0.98]">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-surface-container flex items-center justify-center">
<span class="material-symbols-outlined text-primary" data-icon="upload_file">upload_file</span>
</div>

</div>
<span class="material-symbols-outlined text-outline group-hover:translate-x-1 transition-transform">chevron_right</span>
</button>
<!-- Row: Favorites -->
<button class="w-full glass-panel flex items-center justify-between p-4 rounded-xl hover:bg-surface-variant/50 transition-colors group active:scale-[0.98]">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-surface-container flex items-center justify-center">
<span class="material-symbols-outlined text-primary" data-icon="favorite">favorite</span>
</div>
<span class="font-body-lg text-body-lg text-on-surface">Favorites</span>
</div>
<span class="material-symbols-outlined text-outline group-hover:translate-x-1 transition-transform">chevron_right</span>
</button>
<!-- Row: App Theme (Toggle) -->

<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-surface-container flex items-center justify-center">

</div>
<span class="font-body-lg text-body-lg text-on-surface">App Theme</span>

<div class="w-11 h-6 bg-surface-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>

</a>

<!-- Ambient Micro-Interactions -->
<script>
        document.querySelectorAll('button, a').forEach(elem => {
            elem.addEventListener('mousedown', () => {
                elem.style.transform = 'scale(0.96)';
            });
            elem.addEventListener('mouseup', () => {
                elem.style.transform = '';
            });
            elem.addEventListener('mouseleave', () => {
                elem.style.transform = '';
            });
        });

        // Theme toggle logic (visual only for this prototype)
        const toggle = document.querySelector('input[type="checkbox"]');
        toggle.addEventListener('change', (e) => {
            console.log('Theme changed:', e.target.checked ? 'Dark' : 'Light');
        });
    </script>
