<style>
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.15); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-pulse-glow {
            animation: pulse-glow 4s ease-in-out infinite;
        }
        .animate-float {
            animation: float 5s ease-in-out infinite;
        }
        .animate-fade-in-up {
            animation: fade-in-up 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;

<script>
        // Micro-interaction: Progress bar simulation and page transition logic
        document.addEventListener('DOMContentLoaded', () => {
            const progressBar = document.getElementById('progress-bar');
            
            // Start the loading simulation
            setTimeout(() => {
                progressBar.style.width = '100%';
            }, 100);

            // Subtle mouse tracking glow effect
            document.addEventListener('mousemove', (e) => {
                const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
                const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
                
                const logoWrapper = document.querySelector('.animate-float');
                if (logoWrapper) {
                    logoWrapper.style.transform = `translate(${moveX}px, ${moveY}px)`;
                }
            });
            
            // Redirect simulation (logic for the developer to implement)
            // setTimeout(() => {

        });
    </script>
