name: csbouira_app
description: "CS Bouira – Academic resource sharing app for CS students at Université de Bouira."
publish_to: "none"
version: 1.0.1+1
environment:
  sdk: ^3.7.2
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  shared_preferences: ^2.3.4
  http: ^1.2.2
  flutter_dotenv: ^5.2.1
  font_awesome_flutter: ^10.7.0
  url_launcher: ^6.3.1
  cached_network_image: ^3.4.1
  image_picker: ^1.2.1
  supabase_flutter: ^2.15.0
  google_sign_in: ^7.2.0
  flutter_slidable: ^4.0.3
  syncfusion_flutter_pdfviewer: ^28.2.3
  webview_flutter: ^4.10.0
  path_provider: ^2.1.5
  photo_view: ^0.15.0
  file_picker: ^8.1.7
  flutter_doc_scanner: ^0.0.20
  mime: ^2.0.0
  open_filex: ^4.5.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  permission_handler: ^11.3.1
  connectivity_plus: ^6.1.0
  package_info_plus: ^9.0.1
  pub_semver: ^2.1.5
  flutter_markdown: ^0.7.7+1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "images/csbouira.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env
    - images/
    - PRIVACY_POLICY.md
    - TERMS_OF_USE.md
  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-Variable.ttf
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Variable.ttf
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Variable.ttf
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Variable.ttf
